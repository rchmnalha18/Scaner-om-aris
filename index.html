<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Work Request - PT HYDRAXLE PERKASA</title>
  
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <style>
    /* CSS UNTUK ESTETIKA MODERN CORPORATE & POP-UP (MODAL) */
    :root { 
      --primary-blue: #2a52be; /* Warna Biru Utama Corporate */
      --accent-orange: #ff8c00; 
      --accent-red: #e74c3c; 
      --success-green: #2ecc71; 
      --bg-light: #fdf5e6; 
      --text-main: #333;
    }
    
    body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; color: var(--text-main); }
    
    /* Kartu Utama di Halaman Standby */
    .main-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border: 1px solid #f0f0f0; transition: all 0.3s ease; z-index: 10; }
    .logo-container { margin-bottom: 20px; }
    .company-name { color: var(--accent-red); font-weight: bold; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1.5px; }
    .app-title { font-size: 24px; font-weight: 800; color: #1a1a1a; margin-bottom: 5px; }
    .app-subtitle { font-size: 13px; color: #888; margin-bottom: 35px; }
    
    /* Tombol Utama untuk Buka Scanner */
    .btn-primary-scan { background: linear-gradient(135deg, var(--accent-orange) 0%, #ff4500 100%); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(255,69,0,0.3); transition: transform 0.2s, box-shadow 0.2s; border: 2px solid #ff4500; text-transform: uppercase; letter-spacing: 1px; }
    .btn-primary-scan:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(255,69,0,0.15); }
    .btn-primary-scan:hover { background: linear-gradient(135deg, #ff9500 0%, #ff5500 100%); }
    
    /* Box Status di Halaman Utama */
    .status-container { text-align: left; }
    .box { padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid; transition: all 0.3s ease; }
    .box-status { background: #fff5f5; border-left-color: var(--accent-red); }
    .box-qr { background: #f0fdf4; border-left-color: var(--success-green); }
    .label { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }
    .content { font-size: 14px; color: #222; font-weight: 500; word-wrap: break-word; }

    /* ========================================= */
    /* STRUKTUR MODAL/POP-UP SCANNER (PENTING!) */
    /* ========================================= */
    .modal-overlay { display: none; /* Standby hidden */ position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px); transition: display 0.2s ease; }
    .modal-content { display: none; /* Standby hidden */ position: relative; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center; border: 2px solid var(--primary-blue); z-index: 1001; }
    
    /* Modal Header & Tombol Close */
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #333; margin: 0; }
    .close-modal-btn { background: none; border: none; font-size: 28px; font-weight: 300; color: #aaa; cursor: pointer; line-height: 1; padding: 0; transition: color 0.2s ease; }
    .close-modal-btn:hover { color: var(--accent-red); }

    /* Area Kamera di Dalam Modal */
    #qr-scanner-viewport { width: 100%; border-radius: 12px; margin-bottom: 20px; overflow: hidden; background: #111; border: 3px solid var(--primary-blue); box-sizing: border-box; box-shadow: inset 0 0 15px rgba(42,82,190,0.4); }
    #status-scan-modal { font-size: 13px; color: #777; font-weight: 500; }
  </style>
</head>
<body>

  <div class="main-card" id="landing-card">
    <div class="logo-container">
      <img src="https://cdn-icons-png.flaticon.com/512/7075/7075333.png" width="55" alt="Hydraxle Gear Logo">
    </div>
    <div class="company-name">PT. HYDRAXLE PERKASA</div>
    <div class="app-title">Work Request</div>
    <div class="app-subtitle">Scanner Web App (v2.0)</div>

    <button class="btn-primary-scan" id="activate-scanner-btn">📸 MULAI SCAN KODE WR</button>

    <div class="status-container">
      <div class="box box-status">
        <span class="label">STATUS SISTEM</span>
        <div class="content" id="status-text-landing">Standby. Tekan tombol untuk scan.</div>
      </div>
      <div class="box box-qr">
        <span class="label">KODE WR TERAKHIR</span>
        <div class="content" id="last-scanned-qr-text">-</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content" id="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Scanner Code WR</h3>
        <button class="close-modal-btn" id="close-modal-btn">&times;</button>
      </div>
      
      <div id="qr-scanner-viewport"></div>
      
      <p id="status-scan-modal">Arahkan kamera ke Kode QR WR</p>
    </div>
  </div>

  <script>
    // =========================================
    // KONFIGURASI: GANTI URL DI BAWAH INI DENGAN URL GAS KAMU (DENGAN /EXEC)
    // =========================================
    const WEB_APP_URL = "URL_WEB_APP_GAS_KAMU_DENGAN_EXEC"; 

    // Referensi Elemen Landing Card
    const activateScannerBtn = document.getElementById('activate-scanner-btn');
    const statusTextLanding = document.getElementById('status-text-landing');
    const lastScannedQrText = document.getElementById('last-scanned-qr-text');
    
    // Referensi Elemen Modal
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const statusScanModal = document.getElementById('status-scan-modal');
    
    let html5QrCode;

    // FUNGSI UTAMA: Buka Modal & Aktifkan Kamera Scanner
    function openModalAndStartScanner() {
        modalOverlay.style.display = 'flex';
        modalContent.style.display = 'block';
        
        statusScanModal.innerText = "Meminta akses kamera...";
        statusScanModal.style.color = "#777";
        
        // Buat instance scanner baru di dalam viewport modal
        html5QrCode = new Html5Qrcode("qr-scanner-viewport");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // Hidupkan Kamera Belakang
        html5QrCode.start(
            { facingMode: "environment" },
            config,
            function(decodedText) {
                // FUNGSI CALLBACK: Dieksekusi jika SUKSES SCAN Kode QR
                handleSuccessfulScan(decodedText);
            }
        ).catch(err => {
            console.error(err);
            statusScanModal.innerText = "Akses Kamera Ditolak atau Gagal!";
            statusScanModal.style.color = var(--accent-red);
        });
    }

    // FUNGSI UTAMA: Matiin Kamera & Tutup Modal
    function closeModal() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                hideModalElements();
            }).catch(err => { 
                console.error("Error stop camera:", err); 
                hideModalElements(); // Paksa tutup meski error
            });
        } else {
            hideModalElements();
        }
    }

    // Fungsi Pembantu: Sembunyikan Pop-up
    function hideModalElements() {
        modalOverlay.style.display = 'none';
        modalContent.style.display = 'none';
    }

    // FUNGSI INTI: Logic Eksekusi setelah Sukses Scan
    function handleSuccessfulScan(decodedText) {
        // 1. Matikan kamera secara Asinkron (Hukumnya Wajib biar gak crash)
        html5QrCode.stop().then(() => {
            
            // 2. Tampilkan Hasil QR di Landing Page Utama
            lastScannedQrText.innerText = decodedText;
            statusTextLanding.innerText = "Mencari data di Database...";
            statusTextLanding.style.color = "#ff8c00"; // Warna Orange Standby

            // 3. Tampilkan Status Sukses Sementara di Dalam Pop-up
            statusScanModal.innerText = "Kode QR Sukses Dikenali.";
            statusScanModal.style.color = "#2ecc71"; // Warna Sukses Hijau

            // 4. Integrasi API ke Backend Google Apps Script (SINKRON!)
            // MENGGUNAKAN PARAMETER 'qr' (Code.js) & FIX CORS REDIRECT!
            fetch(`${WEB_APP_URL}?qr=${encodeURIComponent(decodedText)}`, { 
                method: 'GET', 
                redirect: 'follow' // KRITIS: Bypass CORS Keamanan Google
            })
                .then(response => response.json()) // Parsing ke JSON
                .then(data => {
                    if (data.status === "success" && data.url) {
                        statusTextLanding.innerText = "Ditemukan: " + data.judul;
                        statusTextLanding.style.color = "#2ecc71"; // Hijau Sukses
                        
                        // PERBAIKAN UX UTAMA (PERMINTAAN ALI):
                        // A. Tutup modal/pop-up secara paksa
                        hideModalElements();
                        
                        // B. Langsung pindah halaman DI TAB YANG SAMA (tanpa '_blank')
                        setTimeout(() => { 
                            window.top.location.href = data.url; 
                            // Munculkan lagi tombol scan di landing page (jika user balik lagi)
                            activateScannerBtn.style.display = "block";
                        }, 500);
                        
                    } else { 
                        handleErrorInFetch("KODE QR TIDAK DIKENALI!"); 
                    }
                })
                .catch(err => { 
                    console.error(err); 
                    handleErrorInFetch("GAGAL TERHUBUNG KE DATABASE!"); 
                });
        }).catch(err => { 
            console.error("Gagal menonaktifkan kamera pas sukses scan:", err); 
        });
    }

    // Fungsi Pembantu: Menangani Kesalahan Saat Fetch API
    function handleErrorInFetch(msg) {
        statusTextLanding.innerText = msg;
        statusTextLanding.style.color = "#e74c3c"; // Merah Error
        activateScannerBtn.style.display = "block";
        
        // Tutup modal agar user balik ke landing page utama
        hideModalElements();
    }

    // --- EVENT LISTENERS (INPUT USER) ---
    
    // Klik tombol utama untuk scan
    activateScannerBtn.addEventListener('click', openModalAndStartScanner);
    
    // Klik tombol 'X' di modal
    closeModalBtn.addEventListener('click', closeModal);
    
    // Klik di area overlay gelap (di luar kartu modal) untuk menutup
    modalOverlay.addEventListener('click', function(event) {
        if (event.target === modalOverlay) { closeModal(); }
    });
  </script>
</body>
</html>
